spring:
  application:
    name: backend
  profiles:
    default: local
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/ipjuon}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  web:
    cors:
      allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:8080,http://localhost:8081,http://localhost:5173,https://supabase-connect-zeta.vercel.app,https://resident-connect-lac.vercel.app,https://ipjuon-app.vercel.app}

server:
  port: ${SERVER_PORT:8090}

complex:
  name: 창원 힐스테이트 마크로엔
  full-name: 창원 힐스테이트 마크로엔
  approval-no: "1132500000010"
  total-limit: 20000000000

jwt:
  secret: ${JWT_SECRET:}
  expiration-hours: ${JWT_EXPIRATION_HOURS:8}

admin:
  username: ${ADMIN_USERNAME:ipjuon}
  password: ${ADMIN_PASSWORD:}

bank:
  username: ${BANK_USERNAME:bank}
  password: ${BANK_PASSWORD:}

invite:
  b2c-app-url: ${INVITE_B2C_APP_URL:https://ipjuon-app.vercel.app}

solapi:
  enabled: ${SOLAPI_ENABLED:false}
  api-key: ${SOLAPI_API_KEY:}
  api-secret: ${SOLAPI_API_SECRET:}
  sender: ${SOLAPI_SENDER:}

# Web Push (VAPID) — 입주민 앱 푸시 알림. 키가 비어 있으면 발송 비활성화.
# 키 생성: ./gradlew bootRun --args="--vapid-gen" 또는 별도 utility 실행
webpush:
  enabled: ${WEBPUSH_ENABLED:true}
  subject: ${WEBPUSH_SUBJECT:mailto:admin@ipjuon.com}
  public-key: ${WEBPUSH_PUBLIC_KEY:}
  private-key: ${WEBPUSH_PRIVATE_KEY:}
